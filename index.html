<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>For Her</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Montserrat:wght@100;200;300&display=swap" rel="stylesheet">

    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #010508;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        /* ── Three.js canvas ─────────────────────────────────────────────── */
        canvas {
            position: fixed !important;
            inset: 0;
            width: 100% !important;
            height: 100% !important;
            z-index: 0;
        }

        /* ── Loader ──────────────────────────────────────────────────────── */
        #loader {
            position: fixed;
            inset: 0;
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 18px;
            background: #010508;
            transition: opacity 1.8s ease, visibility 1.8s ease;
        }
        #loader.hide {
            opacity: 0;
            visibility: hidden;
        }
        .loader-ring {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: 0.5px solid rgba(140, 168, 230, 0.12);
            border-top-color: rgba(180, 210, 255, 0.55);
            animation: spin 2.2s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loader-text {
            font-family: 'Montserrat', sans-serif;
            font-size: 8px;
            font-weight: 200;
            letter-spacing: 5px;
            color: rgba(140, 168, 230, 0.28);
            text-transform: uppercase;
            animation: pulse 2s ease-in-out infinite;
        }
        @keyframes pulse { 0%,100%{opacity:0.3} 50%{opacity:0.7} }

        /* ── Top-left: Quote ─────────────────────────────────────────────── */
        #quote-block {
            position: fixed;
            top: clamp(24px, 4vh, 52px);
            left: clamp(20px, 4vw, 60px);
            z-index: 30;
            max-width: min(360px, 42vw);
            pointer-events: none;
            opacity: 0;
            transform: translateY(-14px);
            transition: opacity 3s ease, transform 3s ease;
        }

            #quote-block.show {
                opacity: 1;
                transform: translateY(0);
            }

        /* On small screens, quote moves below the moon (bottom area) */
        @media (max-width: 640px) {
            #quote-block {
                top: auto;
                bottom: clamp(100px, 22vh, 160px);
                left: 50%;
                transform: translateX(-50%) translateY(10px);
                max-width: 88vw;
                text-align: center;
            }

                #quote-block.show {
                    transform: translateX(-50%) translateY(0);
                }

            .q-line {
                margin: 0 auto 16px;
            }
        }

        .q-eyebrow {
            font-family: 'Montserrat', sans-serif;
            font-size: clamp(7px, 0.7vw, 9px);
            font-weight: 200;
            letter-spacing: 4.5px;
            color: rgba(170, 195, 245, 0.72);
            text-transform: uppercase;
            margin-bottom: 12px;
        }

        .q-lang-badge {
            display: inline-block;
            font-family: 'Montserrat', sans-serif;
            font-size: clamp(6px, 0.65vw, 8px);
            font-weight: 200;
            letter-spacing: 3px;
            color: rgba(180, 205, 255, 0.68);
            text-transform: uppercase;
            border: 0.5px solid rgba(160, 185, 245, 0.35);
            padding: 3px 8px;
            border-radius: 20px;
            margin-bottom: 14px;
        }

        .q-line {
            display: block;
            width: 22px;
            height: 0.5px;
            background: rgba(140, 168, 230, 0.40);
            margin-bottom: 16px;
        }

        .q-text {
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            font-size: clamp(15px, 1.7vw, 23px);
            font-weight: 300;
            color: rgba(225, 235, 255, 0.95);
            line-height: 1.7;
            letter-spacing: 0.15px;
            text-shadow: 0 0 28px rgba(0, 0, 0, 0.85), 0 1px 8px rgba(0, 0, 0, 0.70);
        }

        .q-translation {
            margin-top: 10px;
            font-family: 'Montserrat', sans-serif;
            font-size: clamp(7px, 0.65vw, 9px);
            font-weight: 200;
            letter-spacing: 1.5px;
            color: rgba(175, 198, 240, 0.72);
            line-height: 1.6;
            font-style: normal;
            text-shadow: 0 0 18px rgba(0, 0, 0, 0.80);
        }

        .q-attr {
            margin-top: 14px;
            font-family: 'Montserrat', sans-serif;
            font-size: clamp(6px, 0.6vw, 8px);
            font-weight: 200;
            letter-spacing: 3px;
            color: rgba(155, 178, 228, 0.62);
            text-transform: uppercase;
            text-shadow: 0 0 14px rgba(0, 0, 0, 0.75);
        }

        /* ── Top-right: Day pill ─────────────────────────────────────────── */
        #day-pill {
            position: fixed;
            top: clamp(24px, 4vh, 52px);
            right: clamp(20px, 4vw, 60px);
            z-index: 30;
            font-family: 'Montserrat', sans-serif;
            font-size: clamp(6px, 0.65vw, 8px);
            font-weight: 200;
            letter-spacing: 4px;
            color: rgba(165, 190, 235, 0.70);
            text-transform: uppercase;
            pointer-events: none;
            opacity: 0;
            transition: opacity 3s ease 1.2s;
            text-align: right;
            text-shadow: 0 0 14px rgba(0, 0, 0, 0.75);
        }

            #day-pill.show {
                opacity: 1;
            }

        /* ── Bottom-left: Signature ──────────────────────────────────────── */
        #signature {
            position: fixed;
            bottom: clamp(24px, 4vh, 52px);
            left: clamp(20px, 4vw, 60px);
            z-index: 30;
            display: flex;
            align-items: flex-end;
            gap: 12px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 3s ease 1s;
        }

            #signature.show {
                opacity: 1;
            }

        .sig-bar {
            width: 0.5px;
            height: 40px;
            background: rgba(140, 168, 230, 0.40);
            flex-shrink: 0;
        }

        .sig-text {
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            font-size: clamp(11px, 1vw, 14px);
            font-weight: 300;
            color: rgba(185, 205, 248, 0.68);
            letter-spacing: 1px;
            padding-bottom: 2px;
            text-shadow: 0 0 14px rgba(0, 0, 0, 0.75);
        }

        @media (max-width: 640px) {
            #signature {
                display: none;
            }
        }

        /* ── Bottom-right: Countdown ─────────────────────────────────────── */
        #countdown-block {
            position: fixed;
            bottom: clamp(24px, 4vh, 52px);
            right: clamp(20px, 4vw, 60px);
            z-index: 30;
            text-align: right;
            pointer-events: none;
            opacity: 0;
            transform: translateY(14px);
            transition: opacity 3s ease 0.5s, transform 3s ease 0.5s;
        }

            #countdown-block.show {
                opacity: 1;
                transform: translateY(0);
            }

        @media (max-width: 640px) {
            #countdown-block {
                bottom: clamp(18px, 3vh, 36px);
                right: 50%;
                transform: translateX(50%) translateY(14px);
                text-align: center;
            }

                #countdown-block.show {
                    transform: translateX(50%) translateY(0);
                }
        }

        .cd-headline {
            font-family: 'Montserrat', sans-serif;
            font-size: clamp(6px, 0.65vw, 8px);
            font-weight: 200;
            letter-spacing: 4.5px;
            color: rgba(165, 190, 235, 0.70);
            text-transform: uppercase;
            margin-bottom: 16px;
            text-shadow: 0 0 14px rgba(0, 0, 0, 0.75);
        }

        .cd-units {
            display: flex;
            align-items: flex-start;
            justify-content: flex-end;
            gap: clamp(2px, 0.5vw, 6px);
        }

        @media (max-width: 640px) {
            .cd-units {
                justify-content: center;
            }
        }

        .cd-cell {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            min-width: clamp(36px, 5vw, 58px);
        }

        .cd-num {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(36px, 5vw, 66px);
            font-weight: 300;
            color: rgba(215, 228, 255, 0.95);
            line-height: 1;
            text-align: center;
            letter-spacing: -1px;
            text-shadow: 0 0 50px rgba(120, 160, 255, 0.18), 0 0 20px rgba(0, 0, 0, 0.80);
            transition: opacity 0.18s ease, transform 0.18s ease;
        }

            .cd-num.tick {
                opacity: 0.25;
                transform: translateY(-5px);
            }

        .cd-lbl {
            font-family: 'Montserrat', sans-serif;
            font-size: clamp(5px, 0.55vw, 7px);
            font-weight: 200;
            letter-spacing: 2.5px;
            color: rgba(155, 178, 225, 0.62);
            text-transform: uppercase;
            text-shadow: 0 0 10px rgba(0, 0, 0, 0.70);
        }

        .cd-colon {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(28px, 4vw, 54px);
            font-weight: 300;
            color: rgba(160, 185, 235, 0.35);
            line-height: 1;
            padding-top: 1px;
            align-self: flex-start;
        }

        .cd-date {
            margin-top: 14px;
            font-family: 'Montserrat', sans-serif;
            font-size: clamp(6px, 0.6vw, 8px);
            font-weight: 100;
            letter-spacing: 5px;
            color: rgba(145, 168, 215, 0.58);
            text-transform: uppercase;
            text-shadow: 0 0 14px rgba(0, 0, 0, 0.75);
        }

        /* ── Corner brackets ─────────────────────────────────────────────── */
        .corner {
            position: fixed;
            z-index: 30;
            width: 12px;
            height: 12px;
            opacity: 0.28;
            pointer-events: none;
        }

            .corner.tl {
                top: 16px;
                left: 18px;
                border-top: 0.5px solid #8aaae0;
                border-left: 0.5px solid #8aaae0;
            }

            .corner.tr {
                top: 16px;
                right: 18px;
                border-top: 0.5px solid #8aaae0;
                border-right: 0.5px solid #8aaae0;
            }

            .corner.bl {
                bottom: 16px;
                left: 18px;
                border-bottom: 0.5px solid #8aaae0;
                border-left: 0.5px solid #8aaae0;
            }

            .corner.br {
                bottom: 16px;
                right: 18px;
                border-bottom: 0.5px solid #8aaae0;
                border-right: 0.5px solid #8aaae0;
            }

        /* ── Birthday reveal ─────────────────────────────────────────────── */
        #bday-veil {
            position: fixed;
            inset: 0;
            z-index: 40;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: clamp(10px, 2vh, 20px);
            pointer-events: none;
            opacity: 0;
            transition: opacity 4.5s ease;
        }

            #bday-veil.show {
                opacity: 1;
            }

        .bday-main {
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            font-size: clamp(22px, 3.8vw, 50px);
            font-weight: 300;
            color: rgba(218, 232, 255, 0.9);
            text-align: center;
            letter-spacing: 1px;
            text-shadow: 0 0 80px rgba(140, 180, 255, 0.25);
            padding: 0 24px;
        }

        .bday-tamil {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(14px, 2vw, 26px);
            font-weight: 300;
            color: rgba(175, 200, 255, 0.55);
            text-align: center;
            line-height: 1.75;
            max-width: min(580px, 90vw);
            padding: 0 24px;
        }

        .bday-sub {
            font-family: 'Montserrat', sans-serif;
            font-size: clamp(7px, 0.7vw, 9px);
            font-weight: 200;
            letter-spacing: 6px;
            color: rgba(140, 168, 230, 0.25);
            text-transform: uppercase;
            margin-top: 6px;
        }
    </style>
</head>
<body>

    <!-- Loader -->
    <div id="loader">
        <div class="loader-ring"></div>
        <div class="loader-text">konjo daily open pannunga...pls</div>
    </div>

    <!-- Corner accents -->
    <div class="corner tl"></div>
    <div class="corner tr"></div>
    <div class="corner bl"></div>
    <div class="corner br"></div>

    <!-- Quote: top-left -->
    <div id="quote-block">
        <div class="q-eyebrow" id="qEyebrow"></div>
        <div class="q-lang-badge" id="qLang"></div>
        <div class="q-line"></div>
        <div class="q-text" id="qText"></div>
        <div class="q-translation" id="qTrans"></div>
        <div class="q-attr" id="qAttr"></div>
    </div>

    <!-- Day pill: top-right -->
    <div id="day-pill"></div>

    <!-- Signature: bottom-left -->
    <div id="signature">
        <div class="sig-bar"></div>
        <div class="sig-text">for her</div>
    </div>

    <!-- Countdown: bottom-right -->
    <div id="countdown-block">
        <div class="cd-headline">until her day</div>
        <div class="cd-units">
            <div class="cd-cell"><div class="cd-num" id="cdD">--</div><div class="cd-lbl">days</div></div>
            <div class="cd-colon">:</div>
            <div class="cd-cell"><div class="cd-num" id="cdH">--</div><div class="cd-lbl">hrs</div></div>
            <div class="cd-colon">:</div>
            <div class="cd-cell"><div class="cd-num" id="cdM">--</div><div class="cd-lbl">min</div></div>
            <div class="cd-colon">:</div>
            <div class="cd-cell"><div class="cd-num" id="cdS">--</div><div class="cd-lbl">sec</div></div>
        </div>
        <div class="cd-date">April 10 · 2026</div>
    </div>

    <!-- Birthday veil -->
    <div id="bday-veil">
    <div class="bday-main">Happy Birthday.</div>
    <div class="bday-tamil">
      நம்மிடையே என்ன நடந்தாலும்,<br>
      உன் பிறந்தநாள் அழகாக இருக்கட்டும்.<br>
      உன்னை நேசிக்கிறேன் — அது மாறாது.
    </div>
    <div class="bday-sub">April 10 · always, regardless</div>
  </div>
 
  <script>
  const QUOTES = [
    { lang:'English',     text:'Some people deserve the whole sky — you are one of them.',                                        trans:'',                                                                              attr:'March 15'     },
    { lang:'Tamil',       text:'நீ எங்கு இருந்தாலும், உன்னை நினைக்கிறேன்.',                                                     trans:'Wherever you are, I am thinking of you.',                                      attr:'March 16'     },
    { lang:'French',      text:'Même dans le silence, je pense à toi.',                                                          trans:'Even in the silence, I think of you.',                                         attr:'March 17'     },
    { lang:'Japanese',    text:'どんな時も、あなたのことが心にある。',                                                                  trans:'No matter what, you are always in my heart.',                                  attr:'March 18'     },
    { lang:'Spanish',     text:'No siempre encuentro las palabras, pero siempre te encuentro a ti.',                             trans:'I do not always find the words, but I always find you.',                         attr:'March 19'     },
    { lang:'Korean',      text:'말은 못해도, 네가 잘 있길 바라고 있어.',                                                               trans:'Even without words, I hope you are doing well.',                                attr:'March 20'     },
    { lang:'Italian',     text:'Il silenzio non cambia quello che sento per te.',                                                 trans:'Silence does not change what I feel for you.',                                  attr:'March 21'     },
    { lang:'Hindi',       text:'कुछ कहा न जाए, पर दुआ तो हमेशा तुम्हारे लिए है।',                                              trans:'Words may not come, but my prayers are always for you.',                         attr:'March 22'     },
    { lang:'Portuguese',  text:'Mesmo sem palavras, o meu coração ainda bate por você.',                                         trans:'Even without words, my heart still beats for you.',                             attr:'March 23'     },
    { lang:'German',      text:'Manchmal weiß ich nicht, wie ich es sagen soll. Aber ich denke an dich.',                        trans:'Sometimes I do not know how to say it. But I think of you.',                    attr:'March 24'     },
    { lang:'Arabic',      text:'في كلّ لحظة صمت، قلبي يسألُ عنكِ.',                                                             trans:'In every quiet moment, my heart asks about you.',                               attr:'March 25'     },
    { lang:'Malayalam',   text:'ദൂരം എത്ര തന്നെ ആയാലും, നിന്നെ ഓർക്കാതിരിക്കാൻ കഴിയില്ല.',                                    trans:'No matter the distance, I cannot stop thinking of you.',                        attr:'March 26'     },
    { lang:'Turkish',     text:'Seni düşünmek, her şeyi biraz daha hafif yapıyor.',                                              trans:'Thinking of you makes everything a little lighter.',                             attr:'March 27'     },
    { lang:'Bengali',     text:'তোমার কথা মনে পড়লে মন শান্ত হয়ে যায়।',                                                         trans:'Thinking of you brings a quiet calm to my mind.',                               attr:'March 28'     },
    { lang:'Swahili',     text:'Moyo wangu unakumbuka upole wako, hata mbali nawe.',                                             trans:'My heart remembers your gentleness, even from afar.',                           attr:'March 29'     },
    { lang:'Greek',       text:'Ακόμα και όταν δεν μιλάμε, σκέφτομαι πάντα εσένα.',                                            trans:'Even when we are not talking, I am always thinking of you.',                    attr:'March 30'     },
    { lang:'Persian',     text:'در هر سکوتی، به تو فکر می‌کنم.',                                                                 trans:'In every silence, I think of you.',                                             attr:'March 31'     },
    { lang:'Urdu',        text:'الفاظ نہ ہوں تو بھی، تمہاری خیر دل میں ہے۔',                                                   trans:'Even without words, your wellbeing lives in my heart.',                         attr:'April 1'      },
    { lang:'Punjabi',     text:'ਕੁਝ ਕਿਹਾ ਨਾ ਜਾਏ, ਪਰ ਮਨ ਤੇਰੇ ਵੱਲ ਝੁਕਦਾ ਹੈ।',                                                    trans:'Words may not come, but my heart still leans toward you.',                      attr:'April 2'      },
    { lang:'Marathi',     text:'काहीही असो, तुझ्याबद्दलची काळजी मनात असतेच.',                                                   trans:'Whatever it is, care for you always lives in my heart.',                        attr:'April 3'      },
    { lang:'Dutch',       text:'Ook als ik niet weet wat ik moet zeggen, denk ik aan jou.',                                     trans:'Even when I do not know what to say, I think of you.',                           attr:'April 4'      },
    { lang:'Sinhala',     text:'ඔබ ගැන සිතන විට, හදවත සන්සුන් වේ.',                                                            trans:'When I think of you, my heart grows calm.',                                     attr:'April 5'      },
    { lang:'Nepali',      text:'जे भए पनि, तिम्रो खुसी नै मेरो चाहना हो।',                                                     trans:'Whatever it is, your happiness is all I want.',                                 attr:'April 6'      },
    { lang:'Russian',     text:'Что бы ни было, я желаю тебе только хорошего.',                                                  trans:'Whatever it is, I wish you nothing but good things.',                           attr:'April 7'      },
    { lang:'Swedish',     text:'Även när orden tryter, finns du kvar i mina tankar.',                                            trans:'Even when words fail, you remain in my thoughts.',                               attr:'April 8'      },
    { lang:'English',     text:'Whatever we are going through — you still deserve the most beautiful birthday.',                 trans:'',                                                                              attr:'April 9'      },
    { lang:'Tamil',       text:'நம்மிடையே என்ன நடந்தாலும், உன் பிறந்தநாளன்று நான் உன்னை நேசிக்கிறேன் — அது மாறாது.',        trans:'Whatever is between us, on your birthday I love you — that never changes.',    attr:'ஏப்ரல் 10'   },
  ];
        // ─── Dates ─────────────────────────────────────────────────────────────────
        const BIRTHDAY = new Date('2026-04-10T00:00:00');
        const COUNT_START = new Date('2026-03-15T00:00:00');
        const TOTAL_DAYS = Math.round((BIRTHDAY - COUNT_START) / 86400000); // 26

        function getDayIndex() {
            const now = new Date(); now.setHours(0, 0, 0, 0);
            const s = new Date(COUNT_START); s.setHours(0, 0, 0, 0);
            return Math.max(0, Math.min(TOTAL_DAYS, Math.floor((now - s) / 86400000)));
        }

        function pad(n) { return String(n).padStart(2, '0'); }

        // ─── Populate today's quote ─────────────────────────────────────────────────
        const day = getDayIndex();
        const q = QUOTES[Math.min(day, QUOTES.length - 1)];

        document.getElementById('qEyebrow').textContent = `Day ${day} of 26`;
        document.getElementById('qLang').textContent = q.lang;
        document.getElementById('qText').textContent = q.text;
        document.getElementById('qAttr').textContent = q.attr;

        const transEl = document.getElementById('qTrans');
        if (q.trans) {
            transEl.textContent = q.trans;
            transEl.style.display = '';
        } else {
            transEl.style.display = 'none';
        }

        document.getElementById('day-pill').textContent = `${TOTAL_DAYS - day} days remaining`;

        // ─── Birthday check ─────────────────────────────────────────────────────────
        const isBirthday = BIRTHDAY.getTime() <= Date.now();
        if (isBirthday) {
            setTimeout(() => document.getElementById('bday-veil').classList.add('show'), 2200);
        }

        // ─── Staggered UI reveal ────────────────────────────────────────────────────
        setTimeout(() => {
            document.getElementById('quote-block').classList.add('show');
            document.getElementById('day-pill').classList.add('show');
        }, 1600);
        setTimeout(() => {
            document.getElementById('countdown-block').classList.add('show');
            document.getElementById('signature').classList.add('show');
        }, 2000);

        // ─── Countdown ──────────────────────────────────────────────────────────────
        const cdD = document.getElementById('cdD');
        const cdH = document.getElementById('cdH');
        const cdM = document.getElementById('cdM');
        const cdS = document.getElementById('cdS');
        let prevS = -1;

        function tick() {
            const diff = BIRTHDAY.getTime() - Date.now();
            if (diff <= 0) {
                cdD.textContent = '00'; cdH.textContent = '00';
                cdM.textContent = '00'; cdS.textContent = '00';
                if (!isBirthday)
                    setTimeout(() => document.getElementById('bday-veil').classList.add('show'), 800);
                return;
            }
            const d = Math.floor(diff / 86400000);
            const h = Math.floor((diff % 86400000) / 3600000);
            const m = Math.floor((diff % 3600000) / 60000);
            const s = Math.floor((diff % 60000) / 1000);
            if (s !== prevS) {
                cdS.classList.add('tick');
                setTimeout(() => { cdS.classList.remove('tick'); cdS.textContent = pad(s); }, 160);
                if (prevS !== -1 && prevS > s) {
                    cdM.classList.add('tick');
                    setTimeout(() => { cdM.classList.remove('tick'); cdM.textContent = pad(m); }, 160);
                }
                cdD.textContent = pad(d);
                cdH.textContent = pad(h);
                if (prevS === -1) cdM.textContent = pad(m);
                prevS = s;
            }
        }

        tick();
        setInterval(tick, 1000);
    </script>

    <script type="module" src="main.js"></script>
</body>
</html>
